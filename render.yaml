services:
  - type: web
    name: finance-dashboard
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./prisma/dev.db
      - key: JWT_SECRET
        sync: false   # Set this manually in Render dashboard
      - key: PORT
        value: 10000
